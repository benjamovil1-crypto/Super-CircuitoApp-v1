name: Build APK
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar y Preparar
        run: |
          npm install
          mkdir -p www
          cp index.html www/
          # Esto crea la carpeta www y mete tu app ahí antes de que Capacitor la busque

      - name: Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Sincronizar y Construir
        run: |
          npx cap sync android
          cd android && chmod +x gradlew
          ./gradlew assembleDebug

      - name: Subir APK
        uses: actions/upload-artifact@v4
        with:
          name: SuperAsistente-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
